name: Changeset for deps

# Renovate PRs don't carry a changeset, so a merged dependency bump would
# otherwise never trigger a release. This drops a changeset on master after
# the merge; the scheduled Release workflow consumes it on its next run.
on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: deps-changeset
  cancel-in-progress: false

jobs:
  changeset:
    # React only to Renovate's dependency-update commits (semantic "(deps)" scope), and never to
    # this workflow's own changeset commit — its message also contains "(deps)", and because we now
    # push with a PAT (which DOES re-trigger workflows) that would otherwise loop forever.
    if: >-
      contains(github.event.head_commit.message, '(deps)')
      && !startsWith(github.event.head_commit.message, 'chore: changeset for')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Push the changeset commit as the token owner (a repo admin) so it bypasses branch
          # protection; github-actions[bot] can't push directly to protected master.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Add a changeset for the dependency update
        run: |
          msg="$(git log -1 --pretty=%s)"
          cat > ".changeset/renovate-${GITHUB_SHA::8}.md" <<EOF
          ---
          "skillmesh": patch
          ---

          ${msg}
          EOF
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changeset
          # `[skip ci]` — this PAT push re-triggers workflows; the changeset-only commit needs no CI.
          git commit -m "chore: changeset for ${msg} [skip ci]"
          # Pushed with RELEASE_TOKEN (a PAT) so it clears branch protection. This push re-triggers
          # workflows, but the job's `if` guard skips this commit, so there is no loop.
          git push

name: Changeset for deps

# Renovate PRs don't carry a changeset, so a merged dependency bump would
# otherwise never trigger a release. This drops a changeset on master after
# the merge; the scheduled Release workflow consumes it on its next run.
on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: deps-changeset
  cancel-in-progress: false

jobs:
  changeset:
    # React only to Renovate's dependency-update commits (semantic "(deps)" scope).
    if: contains(github.event.head_commit.message, '(deps)')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Add a changeset for the dependency update
        run: |
          msg="$(git log -1 --pretty=%s)"
          cat > ".changeset/renovate-${GITHUB_SHA::8}.md" <<EOF
          ---
          "skillmesh": patch
          ---

          ${msg}
          EOF
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changeset
          git commit -m "chore: changeset for ${msg}"
          # Pushed with GITHUB_TOKEN, so it won't re-trigger this workflow (no loop).
          git push

name: Release

on:
  schedule:
    - cron: "0 9 */3 * *"   # roughly every 3 days, 09:00 UTC
  workflow_dispatch:         # manual "release now" button

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Push the "chore: release" commit + tags as the token owner (a repo admin), so it
          # bypasses branch protection (github-actions[bot] can't push to protected master).
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - name: Ensure recent npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for pending changesets
        id: check
        run: |
          if ls .changeset/*.md 2>/dev/null | grep -qv README; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      # Consumes changesets: bumps the version in package.json and writes CHANGELOG.md.
      - name: Version + changelog
        if: steps.check.outputs.release == 'true'
        run: |
          bunx changeset version
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release"
          git push

      # Publishes to npm via OIDC + automatic provenance and pushes tags.
      - name: Publish to npm
        if: steps.check.outputs.release == 'true'
        run: |
          bunx changeset publish
          git push --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # `changeset publish` only creates git tags; GitHub Releases are a separate concept, so make
      # one per freshly-pushed tag with the matching CHANGELOG section as its body.
      - name: Create GitHub release(s)
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Notes = the block under the first "## " heading in CHANGELOG.md (drop the heading line).
          notes="$(awk '/^## /{n++} n==1{print} n==2{exit}' CHANGELOG.md | tail -n +2)"
          for tag in $(git tag --points-at HEAD); do
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Release $tag already exists; skipping."
            else
              gh release create "$tag" --title "$tag" --notes "${notes:-$tag}"
            fi
          done

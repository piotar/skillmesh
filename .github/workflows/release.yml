name: Release

on:
  schedule:
    - cron: "0 9 */3 * *"   # roughly every 3 days, 09:00 UTC
  workflow_dispatch:         # manual "release now" button

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - name: Ensure recent npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for pending changesets
        id: check
        run: |
          if ls .changeset/*.md 2>/dev/null | grep -qv README; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      # Consumes changesets: bumps the version in package.json and writes CHANGELOG.md.
      - name: Version + changelog
        if: steps.check.outputs.release == 'true'
        run: |
          bunx changeset version
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release"
          git push

      # Publishes to npm via OIDC + automatic provenance and pushes tags.
      - name: Publish to npm
        if: steps.check.outputs.release == 'true'
        run: |
          bunx changeset publish
          git push --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

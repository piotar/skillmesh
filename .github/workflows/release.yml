name: Release

on:
  push:
    branches:
      - master

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - name: Ensure recent npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Opens/updates the "Version Packages" PR; when that PR is merged
      # (no changesets left, version bumped) it runs `changeset publish`,
      # which publishes via npm using OIDC + automatic provenance.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: changeset version
          publish: changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
